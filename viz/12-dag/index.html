<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>12 — Кратчайшие пути в DAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/base.css">
</head>
<body>
<header>
  <a href="../index.html" class="back-link">← Все алгоритмы</a>
  <h1>12 — <span>Кратчайшие пути в DAG</span></h1>
  <div class="complexity">
    <span class="badge">Время: <b>O(V + E)</b></span>
    <span class="badge">Память: <b>O(V)</b></span>
  </div>
</header>
<main>
  <div id="left-panel">
    <div id="controls"></div>
    <div id="canvas-wrap">
      <svg id="viz-svg"></svg>
      <div class="canvas-hint">Клик — вершина · Клик→клик — ребро (вес задаётся при добавлении) · ПКМ — удалить</div>
    </div>
  </div>
  <div id="right-panel">
    <div id="pseudo"><h3>Псевдокод</h3></div>
    <div id="state-panel">
      <h3>Состояние</h3>
      <div class="state-row"><span class="state-key">Фаза</span><div class="chips" id="chips-phase"></div></div>
      <div class="state-row"><span class="state-key">Топо-порядок</span><div class="chips" id="chips-topo"></div></div>
      <h3 style="margin-top:8px">Расстояния</h3>
      <table class="viz-table">
        <thead><tr><th>Верш.</th><th>dist</th></tr></thead>
        <tbody id="dist-tbody"></tbody>
      </table>
    </div>
    <div id="step-desc">Нажмите <b>Запустить</b>.</div>
    <div id="legend">
      <h3>Легенда</h3>
      <div class="legend-grid">
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-gray)"></span> Топо-фаза</div>
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-black)"></span> Релаксировано</div>
        <div class="legend-item"><span class="leg-line" style="background:var(--col-black)"></span> Путь</div>
      </div>
    </div>
  </div>
</main>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="../shared/engine.js"></script>
<script src="algo.js"></script>
</body>
</html>
