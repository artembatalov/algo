<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>19 — Мосты и точки сочленения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/base.css">
</head>
<body>
<header>
  <a href="../index.html" class="back-link">← Все алгоритмы</a>
  <h1>19 — <span>Мосты и точки сочленения</span></h1>
  <div class="complexity">
    <span class="badge">Время: <b>O(V + E)</b></span>
    <span class="badge">Память: <b>O(V)</b></span>
  </div>
</header>
<main>
  <div id="left-panel">
    <div id="controls"></div>
    <div id="canvas-wrap">
      <svg id="viz-svg"></svg>
      <div class="canvas-hint">Клик — вершина · Клик→клик — ребро · ПКМ — удалить · Тащи — перемещать</div>
    </div>
  </div>
  <div id="right-panel">
    <div id="pseudo"><h3>Псевдокод</h3></div>
    <div id="state-panel">
      <h3>Состояние</h3>
      <div class="state-row"><span class="state-key">Мосты</span><div class="chips" id="chips-bridges"></div></div>
      <div class="state-row"><span class="state-key">Т.сочл.</span><div class="chips" id="chips-apoints"></div></div>
      <h3 style="margin-top:8px">tin / low</h3>
      <table class="viz-table">
        <thead><tr><th>Верш.</th><th>tin</th><th>low</th></tr></thead>
        <tbody id="tinlow-tbody"></tbody>
      </table>
    </div>
    <div id="step-desc">Нажмите <b>Запустить</b>.</div>
    <div id="legend">
      <h3>Легенда</h3>
      <div class="legend-grid">
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-gray)"></span> В DFS</div>
        <div class="legend-item"><span class="leg-dot" style="background:#ef4444"></span> Точка сочленения</div>
        <div class="legend-item"><span class="leg-dash" style="color:#ef4444"></span> Мост</div>
      </div>
    </div>
  </div>
</main>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="../shared/engine.js"></script>
<script src="algo.js"></script>
</body>
</html>
