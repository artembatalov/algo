<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>04 — Конденсация графа (SCC)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/base.css">
</head>
<body>
<header>
  <a href="../index.html" class="back-link">← Все алгоритмы</a>
  <h1>04 — <span>Конденсация графа (SCC, Косарайю)</span></h1>
  <div class="complexity">
    <span class="badge">Время: <b>O(V + E)</b></span>
    <span class="badge">Память: <b>O(V + E)</b></span>
  </div>
</header>
<main>
  <div id="left-panel">
    <div id="controls"></div>
    <div id="canvas-wrap">
      <svg id="viz-svg"></svg>
      <div class="canvas-hint">Клик — вершина · Клик→клик — ребро · ПКМ — удалить · Тащи — перемещать</div>
    </div>
  </div>
  <div id="right-panel">
    <div id="pseudo"><h3>Псевдокод</h3></div>
    <div id="state-panel">
      <h3>Состояние</h3>
      <div class="state-row"><span class="state-key">Фаза</span><div class="chips" id="chips-phase"></div></div>
      <div class="state-row"><span class="state-key">Порядок</span><div class="chips" id="chips-order"></div></div>
      <h3 style="margin-top:8px">КСС (SCC)</h3>
      <div id="scc-list"></div>
    </div>
    <div id="step-desc">Нажмите <b>Запустить</b>.</div>
    <div id="legend">
      <h3>Легенда</h3>
      <div class="legend-grid">
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-gray)"></span> GRAY (активный)</div>
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-black)"></span> BLACK (завершён)</div>
        <div class="legend-item"><span class="leg-dot" style="background:#a855f7"></span> SCC найдена</div>
      </div>
    </div>
  </div>
</main>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="../shared/engine.js"></script>
<script src="algo.js"></script>
</body>
</html>
