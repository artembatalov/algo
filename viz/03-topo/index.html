<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>03 — Топологическая сортировка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/base.css">
</head>
<body>
<header>
  <a href="../" class="back-link">← Все алгоритмы</a>
  <h1>03 — <span>Топологическая сортировка</span></h1>
  <div class="complexity">
    <span class="badge">Время: <b>O(V + E)</b></span>
    <span class="badge">Память: <b>O(V)</b></span>
  </div>
</header>
<main>
  <div id="left-panel">
    <div id="controls"></div>
    <div id="canvas-wrap">
      <svg id="viz-svg"></svg>
      <div class="canvas-hint">Клик — вершина · Клик→клик — ребро · ПКМ — удалить · Тащи — перемещать</div>
    </div>
  </div>
  <div id="right-panel">
    <div id="pseudo"><h3>Псевдокод</h3></div>
    <div id="state-panel">
      <h3>Состояние</h3>
      <div class="state-row"><span class="state-key">GRAY</span><div class="chips" id="chips-gray"></div></div>
      <div class="state-row"><span class="state-key">BLACK</span><div class="chips" id="chips-black"></div></div>
      <h3 style="margin-top:10px">Топо-порядок</h3>
      <div class="chips" id="chips-topo"></div>
    </div>
    <div id="step-desc">Нажмите <b>Запустить</b>, затем управляйте стрелками или кнопками.</div>
    <div id="legend">
      <h3>Легенда</h3>
      <div class="legend-grid">
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-white)"></span> WHITE</div>
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-gray)"></span> GRAY</div>
        <div class="legend-item"><span class="leg-dot" style="background:var(--col-black)"></span> BLACK (выдан)</div>
      </div>
    </div>
  </div>
</main>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="../shared/engine.js"></script>
<script src="algo.js"></script>
</body>
</html>
