<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алгоритмы & СД</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --s1:       #111111;
      --s2:       #181818;
      --border:   #242424;
      --border2:  #303030;
      --text:     #efefef;
      --muted:    #585858;
      --muted2:   #888;
      --amber:    #c8973e;
      --amber-hi: #e0aa52;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Hero ─────────────────────────────────────────── */
    .hero {
      border-bottom: 1px solid var(--border);
      padding: 52px 40px 40px;
    }
    .hero-inner { max-width: 860px; margin: 0 auto; }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(30px, 4vw, 46px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 14px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--amber);
    }

    .hero p {
      font-size: 14px;
      line-height: 1.65;
      color: var(--muted2);
      max-width: 480px;
    }

    /* ── Progress bar ─────────────────────────────────── */
    .progress-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 40px 0;
    }
    .progress-track {
      height: 2px;
      background: var(--border2);
      border-radius: 2px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 2px;
      transition: width .6s ease;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      color: var(--muted);
    }
    .progress-meta b { color: var(--text); font-weight: 600; }

    /* ── Filters ──────────────────────────────────────── */
    .filters {
      max-width: 860px;
      margin: 0 auto;
      padding: 22px 40px 0;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: color .12s, border-color .12s, background .12s;
      font-family: inherit;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active {
      color: var(--amber);
      border-color: var(--amber);
      background: rgba(200,151,62,.07);
    }

    /* ── Grid ─────────────────────────────────────────── */
    .grid {
      max-width: 860px;
      margin: 22px auto 64px;
      padding: 0 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
      gap: 10px;
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      display: block;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s;
      position: relative;
      cursor: pointer;
    }
    .card:hover {
      background: var(--s2);
      border-color: var(--border2);
    }
    .card.card-locked { opacity: .38; pointer-events: none; }

    .card-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .card-num {
      width: 26px; height: 26px;
      border: 1px solid var(--border2);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .card:not(.card-locked) .card-num {
      color: var(--amber);
      border-color: rgba(200,151,62,.35);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }

    .card-foot {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cat-tag {
      font-size: 10.5px;
      font-weight: 500;
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 2px 7px;
    }
    .cplx {
      margin-left: auto;
      font-size: 10.5px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
    }

    /* category tint on tag */
    .cat-traversal { color: #7a9ec8; border-color: rgba(122,158,200,.3); }
    .cat-shortpath { color: #7abf9a; border-color: rgba(122,191,154,.3); }
    .cat-flow      { color: #c8a37a; border-color: rgba(200,163,122,.3); }
    .cat-string    { color: #c87a7a; border-color: rgba(200,122,122,.3); }
    .cat-hash      { color: #aa7ac8; border-color: rgba(170,122,200,.3); }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 24px;
      font-size: 11.5px;
      color: var(--muted);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">ITMO IS · 2 семестр</div>
    <h1>Алгоритмы &amp;<br><em>Структуры данных</em></h1>
    <p>31 интерактивная визуализация. Пошаговая анимация, псевдокод, редактируемый граф — для каждой темы.</p>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="prog-fill" style="width:0"></div>
  </div>
  <div class="progress-meta">
    <span>Готово: <b id="prog-count">0</b> из 31</span>
    <span id="prog-pct">0%</span>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-cat="all">Все</button>
  <button class="filter-btn" data-cat="traversal">Обходы</button>
  <button class="filter-btn" data-cat="shortpath">Кратчайшие пути</button>
  <button class="filter-btn" data-cat="flow">Потоки</button>
  <button class="filter-btn" data-cat="string">Строки</button>
  <button class="filter-btn" data-cat="hash">Хэш</button>
</div>

<div class="grid" id="grid"></div>

<footer>Удачи на коллоквиуме ✦</footer>

<script>
const ALGOS = [
  { n:1,  title:'Обход в глубину (DFS)',              cat:'traversal', t:'O(V+E)',       href:'01-dfs/index.html' },
  { n:2,  title:'Обход в ширину (BFS)',               cat:'traversal', t:'O(V+E)',       href:'02-bfs/index.html' },
  { n:3,  title:'Топологическая сортировка',          cat:'traversal', t:'O(V+E)',       href:'03-topo/index.html' },
  { n:4,  title:'Конденсация графа (Косарайю)',       cat:'traversal', t:'O(V+E)',       href:'04-condensation/index.html' },
  { n:5,  title:'Поиск и восстановление циклов',      cat:'traversal', t:'O(V+E)',       href:'05-cycles/index.html' },
  { n:6,  title:'Гамильтонов цикл',                   cat:'traversal', t:'O(n²)',        href:'06-hamilton/index.html' },
  { n:7,  title:'Эйлеров цикл (Хиерхольцер)',        cat:'traversal', t:'O(E)',         href:'07-euler/index.html' },
  { n:8,  title:'Компоненты связности',               cat:'traversal', t:'O(V+E)',       href:'08-components/index.html' },
  { n:9,  title:'Алгоритм Краскала',                  cat:'shortpath', t:'O(E log E)',   href:'09-kruskal/index.html' },
  { n:10, title:'Алгоритм Прима',                     cat:'shortpath', t:'O(E log V)',   href:'10-prim/index.html' },
  { n:11, title:'Алгоритм Беллмана–Форда',            cat:'shortpath', t:'O(VE)',        href:'11-bellman/index.html' },
  { n:12, title:'Кратчайшие пути в DAG',              cat:'shortpath', t:'O(V+E)',       href:'12-dag/index.html' },
  { n:13, title:'Алгоритм Дейкстры',                  cat:'shortpath', t:'O((V+E)logV)', href:'13-dijkstra/index.html' },
  { n:14, title:'Алгоритм Флойда–Уоршалла',           cat:'shortpath', t:'O(V³)',        href:'14-floyd/index.html' },
  { n:15, title:'Диаметр дерева',                     cat:'shortpath', t:'O(V)',         href:'15-diameter/index.html' },
  { n:16, title:'Алгоритм Куна',                      cat:'flow',      t:'O(VE)',        href:'16-kuhn/index.html' },
  { n:17, title:'Форд–Фалкерсон / Эдмондс–Карп',    cat:'flow',      t:'O(VE²)',       href:'17-maxflow/index.html' },
  { n:18, title:'Форд–Фалкерсон для паросочетания',  cat:'flow',      t:'O(VE)',        href:'18-ff-bipartite/index.html' },
  { n:19, title:'Мосты и точки сочленения',           cat:'flow',      t:'O(V+E)',       href:'19-bridges/index.html' },
  { n:20, title:'Жадная раскраска графа',             cat:'flow',      t:'O(V+E)',       href:'20-coloring/index.html' },
  { n:21, title:'Хэш Рабина–Карпа',                  cat:'string',    t:'O(n+m)',       href:'21-rabin-karp/index.html' },
  { n:22, title:'Префикс-функция',                    cat:'string',    t:'O(n)',         href:'22-prefix/index.html' },
  { n:23, title:'Z-функция',                          cat:'string',    t:'O(n)',         href:'23-z-func/index.html' },
  { n:24, title:'Алгоритм КМП',                       cat:'string',    t:'O(n+m)',       href:'24-kmp/index.html' },
  { n:25, title:'Автомат для поиска подстроки',       cat:'string',    t:'O(n·|Σ|)',    href:'25-automaton/index.html' },
  { n:26, title:'Бор (Trie)',                         cat:'string',    t:'O(|w|)',       href:'26-trie/index.html' },
  { n:27, title:'Хэш-таблица: идея и коллизии',      cat:'hash',      t:'O(1) avg',    href:'27-hashing/index.html' },
  { n:28, title:'Открытая и закрытая адресация',      cat:'hash',      t:'O(1) avg',    href:'28-addressing/index.html' },
  { n:29, title:'Метод Кукушки',                      cat:'hash',      t:'O(1) avg',    href:'29-cuckoo/index.html' },
  { n:30, title:'Фильтр Блума',                       cat:'hash',      t:'O(k)',         href:'30-bloom/index.html' },
  { n:31, title:'Алгоритм Ахо–Корасик',              cat:'string',    t:'O(n+m+z)',     href:'31-aho-corasick/index.html' },
];

const CAT = {
  traversal:'Обход', shortpath:'Кр. пути', flow:'Поток', string:'Строки', hash:'Хэш'
};

// All built — mark all done
const DONE = new Set(ALGOS.map(a => a.n));
const total = 31;
let activeCat = 'all';

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = ALGOS.filter(a => activeCat === 'all' || a.cat === activeCat);
  grid.innerHTML = '';
  filtered.forEach(a => {
    const done = DONE.has(a.n);
    const el = document.createElement('a');
    el.href = a.href;
    el.className = 'card' + (done ? '' : ' card-locked');
    el.innerHTML = `
      <div class="card-head">
        <div class="card-num">${a.n}</div>
        <div class="card-title">${a.title}</div>
      </div>
      <div class="card-foot">
        <span class="cat-tag cat-${a.cat}">${CAT[a.cat]}</span>
        <span class="cplx">${a.t}</span>
      </div>`;
    grid.appendChild(el);
  });
}

function updateProgress() {
  const done = DONE.size;
  const pct = Math.round(done / total * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = done;
  document.getElementById('prog-pct').textContent = pct + '%';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderGrid();
  });
});

updateProgress();
renderGrid();
</script>
</body>
</html>
